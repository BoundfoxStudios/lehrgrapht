@for (option of options(); track option.value) {
  @let active = option.value === value();
  <button
    class="flex-1 cursor-pointer border px-2 py-2.5 text-[11px] font-semibold transition-colors"
    [class.rounded-md]="shape() === 'square'"
    [class.rounded-full]="shape() === 'pill'"
    [class.border-brand]="active"
    [class.bg-brand-soft]="active"
    [class.text-brand-strong]="active"
    [class.border-default-medium]="!active"
    [class.bg-white]="!active"
    [class.text-body]="!active"
    [disabled]="disabled()"
    [attr.aria-checked]="active"
    [attr.aria-label]="option.label"
    (click)="select(option)"
    type="button"
    role="radio"
  >
    {{ option.label }}
  </button>
}
