@if (errorVariant()) {
  <div
    class="flex items-center gap-2.5 bg-rose-50 px-3 py-3 text-rose-700"
    role="alert"
  >
    <span
      class="grid h-8 w-8 shrink-0 place-items-center rounded-full border border-rose-200 bg-white text-rose-600"
      aria-hidden="true"
    >
      <fa-icon [icon]="faCircleExclamation" />
    </span>
    <div class="flex-1">
      <div class="text-xs font-bold">Vorschau nicht verfügbar</div>
      <div class="text-2xs opacity-90">
        @let count = store.errorCount();
        @if (count === 1) {
          1 Fehler verhindert die Vorschau.
        } @else {
          {{ count }} Fehler verhindern die Vorschau.
        }
      </div>
    </div>
  </div>
  <div class="px-2.5 pt-2 pb-2.5">
    <button
      class="rounded-base border-default-medium text-body-subtle flex w-full cursor-not-allowed items-center justify-center gap-1.5 border bg-gray-100 px-3 py-2.5 text-sm font-semibold"
      type="submit"
      disabled
    >
      @if (store.isEditMode()) {
        Im Dokument aktualisieren
      } @else {
        In Word einfügen
      }
    </button>
  </div>
} @else {
  <div
    class="border-default-medium text-body-subtle text-2xs flex items-center justify-between border-b px-2.5 py-1.5"
  >
    <div class="flex items-center gap-1.5 font-semibold">
      <span>Vorschau</span>
      @if (store.isEditMode()) {
        <span>· liegt im Dokument</span>
      }
    </div>
  </div>
  <div class="flex justify-center px-2.5 py-1.5">
    <lg-plot-preview
      [plot]="store.previewModel()"
      [plotSettings]="store.plotSettings()"
    />
  </div>
  <div class="px-2.5 pt-1.5 pb-2.5">
    <button
      class="w-full"
      lgButton
      type="submit"
    >
      @if (store.isEditMode()) {
        <fa-icon [icon]="faRotate" />
        <span>Im Dokument aktualisieren</span>
      } @else {
        <fa-icon [icon]="faPlus" />
        <span>In Word einfügen</span>
      }
    </button>
  </div>
}
