<button
  class="bg-neutral-secondary-medium border-default-medium text-heading rounded-base focus:ring-brand focus:border-brand placeholder:text-body flex w-full cursor-pointer items-center justify-between border px-3 py-2.5 text-left text-sm shadow-xs transition-all duration-200 ease-in-out"
  #triggerButton
  #trigger="cdkOverlayOrigin"
  [class.text-gray-400]="!selectedOption()"
  [disabled]="disabled()"
  [attr.aria-expanded]="isOpen()"
  [attr.aria-controls]="isOpen() ? 'dropdown-listbox' : null"
  (click)="toggle()"
  cdkOverlayOrigin
  type="button"
  role="combobox"
  aria-haspopup="listbox"
>
  <span>{{ displayLabel() }}</span>
  <fa-icon
    class="text-gray-400 transition-transform duration-200"
    [class.rotate-180]="isOpen()"
    [icon]="faChevronDown"
  />
</button>

<ng-template
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen()"
  [cdkConnectedOverlayPositions]="positions"
  [cdkConnectedOverlayMatchWidth]="true"
  (overlayOutsideClick)="close()"
  cdkConnectedOverlay
>
  <ul
    class="z-50 box-border max-h-60 w-full overflow-auto rounded-lg border border-gray-200 bg-white py-1 shadow-lg"
    id="dropdown-listbox"
    #optionsList
    role="listbox"
  >
    @for (option of options(); track option.value; let i = $index) {
      <li
        class="cursor-pointer px-3 py-2 text-sm transition-colors duration-100"
        [class.bg-gray-100]="focusedIndex() === i"
        [class.font-medium]="option.value === value()"
        [class.text-blue-600]="option.value === value()"
        [attr.data-focused]="focusedIndex() === i"
        [attr.aria-selected]="option.value === value()"
        (click)="selectOption(option)"
        (keydown.enter)="selectOption(option)"
        (mouseenter)="onOptionMouseEnter(i)"
        role="option"
        tabindex="0"
      >
        @if (itemTemplate(); as template) {
          <ng-container
            [ngTemplateOutlet]="template"
            [ngTemplateOutletContext]="{ $implicit: option }"
          />
        } @else {
          {{ option.label }}
        }
      </li>
    }
  </ul>
</ng-template>
