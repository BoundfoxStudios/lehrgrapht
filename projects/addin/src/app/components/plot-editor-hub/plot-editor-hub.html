@let model = store.model();

<div class="flex flex-col gap-2.5 p-2.5">
  <div class="border-default-medium rounded-base border bg-white p-2.5">
    <label
      class="text-2xs text-body-subtle mb-0.5 block font-semibold uppercase"
      for="plot-name"
      >Name</label
    >
    <input
      class="text-heading focus:border-default-medium w-full border-0 border-b border-transparent bg-transparent py-1 text-base font-semibold transition-colors focus:outline-none"
      id="plot-name"
      [formField]="store.editorForm.name"
      type="text"
      placeholder="z.B. Parabel, Sinus, ..."
    />
  </div>

  <lg-hub-link-card
    [icon]="faSliders"
    [subtitle]="rangeSubtitle()"
    [routerLink]="['/plot/editor', store.routeId(), 'display']"
    title="Grenzen & Darstellung"
    tabularNums
  />

  <h3
    class="text-2xs text-body-subtle px-0.5 pt-1 font-bold tracking-wider uppercase"
  >
    Objekte
  </h3>
  <div class="grid grid-cols-2 gap-2">
    <lg-hub-tile-card
      [icon]="faSquareRootVariable"
      [subtitle]="fnxSubtitle()"
      [count]="model.fnx.length"
      [routerLink]="['/plot/editor', store.routeId(), 'fnx']"
      title="Funktionen"
    />

    <lg-hub-tile-card
      [icon]="faLocationDot"
      [subtitle]="markersSubtitle()"
      [count]="model.markers.length"
      [routerLink]="['/plot/editor', store.routeId(), 'markers']"
      title="Punkte"
    />

    <lg-hub-tile-card
      [icon]="faDrawPolygon"
      [subtitle]="polygonsSubtitle()"
      [count]="model.polygons.length"
      [routerLink]="['/plot/editor', store.routeId(), 'polygons']"
      title="Polygone & Flächen"
    />
  </div>

  <h3
    class="text-2xs text-body-subtle px-0.5 pt-1 font-bold tracking-wider uppercase"
  >
    Weitere
  </h3>

  <lg-hub-link-card
    [icon]="faArrowsLeftRightToLine"
    [subtitle]="reflectionSubtitle()"
    [routerLink]="['/plot/editor', store.routeId(), 'reflection']"
    title="Spiegelung"
  />
</div>
