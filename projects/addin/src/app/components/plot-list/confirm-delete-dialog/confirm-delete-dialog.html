<div
  class="rounded-base flex w-[20rem] max-w-full flex-col gap-3 bg-white p-4 shadow-xl"
>
  <h2
    class="text-heading text-base font-semibold"
    id="confirm-delete-title"
  >
    Plot löschen?
  </h2>

  <p class="text-body text-sm">
    Soll „{{ data.plotName }}" wirklich aus dem Dokument entfernt werden?
  </p>

  <div class="flex flex-wrap justify-end gap-2 pt-1">
    <button
      (click)="cancel()"
      lgButton
      variant="outline"
      type="button"
    >
      Abbrechen
    </button>
    <button
      (click)="confirm()"
      lgButton
      variant="danger"
      type="button"
    >
      Löschen
    </button>
  </div>
</div>
