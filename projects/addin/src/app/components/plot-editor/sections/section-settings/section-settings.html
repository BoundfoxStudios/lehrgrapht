@let form = store.editorForm;
@let model = store.model();

<div class="flex flex-col space-y-2 p-2">
  <lg-checkbox
    id="show-axis"
    [field]="form.showAxis"
  >
    Achsen anzeigen
  </lg-checkbox>

  @if (model.showAxis) {
    <lg-checkbox
      class="ml-4"
      id="show-axis-labels"
      [field]="form.showAxisLabels"
    >
      Achsenbeschriftung
    </lg-checkbox>

    @if (model.showAxisLabels) {
      <lg-checkbox
        class="ml-8"
        id="place-axis-labels-inside"
        [field]="form.placeAxisLabelsInside"
      >
        An 0-Linie anzeigen
      </lg-checkbox>

      <div class="ml-8 rounded-lg border border-gray-200 bg-white p-3">
        <div class="mb-2 text-xs font-medium text-gray-500">
          Achsenbeschriftung
        </div>
        <div class="flex gap-3">
          <div class="flex-1">
            <label
              class="mb-1 block text-xs text-gray-600"
              for="axis-label-x"
              >X-Achse</label
            >
            <lg-input
              id="axis-label-x"
              [field]="form.axisLabelX"
              type="text"
              placeholder="x"
            />
          </div>
          <div class="flex-1">
            <label
              class="mb-1 block text-xs text-gray-600"
              for="axis-label-y"
              >Y-Achse</label
            >
            <lg-input
              id="axis-label-y"
              [field]="form.axisLabelY"
              type="text"
              placeholder="y"
            />
          </div>
        </div>
        <div class="mt-3">
          <label
            class="mb-1 block text-xs text-gray-600"
            for="legend-label-format"
            >Legendenformat</label
          >
          <lg-dropdown
            [formField]="form.legendLabelFormat"
            [options]="legendLabelFormatOptions"
          />
        </div>
      </div>
    }
  }

  <lg-checkbox
    id="square-plots"
    [field]="form.squarePlots"
  >
    Plot quadratisch generieren
  </lg-checkbox>

  <lg-checkbox
    id="limit-equals-value-range"
    [field]="form.automaticallyAdjustLimitsToValueRange"
  >
    Grenzen automatisch anpassen
  </lg-checkbox>
</div>
