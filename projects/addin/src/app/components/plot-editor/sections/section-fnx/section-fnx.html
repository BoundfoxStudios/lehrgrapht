@let form = store.editorForm;
@let fnx = store.model().fnx;

<div class="flex flex-col gap-y-3 p-2">
  @if (fnx.length === 0) {
    <lg-section-empty-state
      [interactiveMode]="InteractiveMode.Function"
      (manualClick)="addManual()"
      heading="Noch keine Funktionen"
      text="Definiere Funktionen wie x², sin(x), 2x+1 oder was auch immer Du benötigst."
    >
      <lg-section-fnx-image />
    </lg-section-empty-state>
  } @else {
    @if (fnx.length >= 2) {
      <div class="flex justify-end">
        <button
          (click)="toggleAll()"
          lgButton
          variant="outline"
          size="small"
          type="button"
        >
          {{ allCollapsed() ? 'Alle ausklappen' : 'Alle einklappen' }}
        </button>
      </div>
    }
    @for (control of form.fnx; let index = $index; track index) {
      <lg-card
        [title]="'Funktion ' + (index + 1)"
        [expanded]="expandedSet().has(index)"
        [isNew]="newItemIndex() === index"
        (expandedChange)="store.toggleCardExpanded('fnx', index)"
        (cardFocusOut)="newItemIndex.set(null)"
      >
        <lg-id-pill
          [index]="index"
          [color]="control.color().value()"
          card-id
          prefix="f"
        />
        <div
          class="flex items-center gap-2"
          card-actions
        >
          <input
            class="h-7 w-7 cursor-pointer rounded border-none"
            [formField]="control.color"
            type="color"
            title="Farbe wählen"
          />
          <button
            class="flex h-7 w-7 items-center justify-center rounded text-gray-400 transition-colors hover:bg-red-50 hover:text-red-500"
            (click)="store.removeFx(index)"
            type="button"
            title="Funktion entfernen"
          >
            <fa-icon [icon]="faTrashCan" />
          </button>
        </div>

        <div class="mb-2 flex flex-col gap-2">
          <div class="flex items-center justify-between">
            <span class="text-body-subtle text-2xs font-semibold">Stil</span>
            <lg-pill-switch
              [options]="lineStyleOptions"
              [formField]="control.lineStyle"
              shape="pill"
              aria-label="Linienstil"
            />
          </div>
          <div class="flex items-center justify-between gap-2">
            <span class="text-body-subtle text-2xs font-semibold">Legende</span>
            <lg-dropdown
              class="max-w-[180px] flex-1"
              [formField]="control.legendPosition"
              [options]="legendPositionOptions"
            />
          </div>
        </div>
        <div class="flex items-center gap-2">
          <lg-input
            class="flex-1"
            [field]="control.fnx"
            [id]="'fnx-' + index"
            [autofocus]="newItemIndex() === index"
            [spellcheck]="false"
            type="text"
            autocorrect="off"
            autocomplete="off"
            autocapitalize="off"
            placeholder="z.B. x^2, sin(x), ..."
          />
        </div>
        <lg-math-display
          [math]="control.fnx().value()"
          [prefix]="
            store.model().legendLabelFormat === 'none'
              ? undefined
              : store.model().legendLabelFormat
          "
        />
      </lg-card>
    }

    <div class="flex gap-1.5">
      <button
        class="flex-[1.4]"
        (click)="store.startInteractive(InteractiveMode.Function)"
        lgButton
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faMousePointer" />
        <span>Interaktiv</span>
      </button>
      <button
        class="flex-1"
        (click)="addManual()"
        lgButton
        variant="outline"
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faPlusCircle" />
        <span>Manuell</span>
      </button>
    </div>
  }
</div>
