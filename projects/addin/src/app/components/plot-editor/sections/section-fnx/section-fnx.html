@let form = store.editorForm;
@let fnx = store.model().fnx;

<div class="flex flex-col space-y-3 p-2">
  @if (fnx.length === 0) {
    <lg-section-empty-state
      [interactiveMode]="InteractiveMode.StraightLine"
      (manualClick)="addManual()"
      heading="Noch keine Funktionen"
      text="Definiere Funktionen wie x², sin(x) oder 2x+1. Bis zu 4 Funktionen werden in unterschiedlichen Farben gezeichnet."
    >
      <lg-section-fnx-image />
    </lg-section-empty-state>
  } @else {
    @for (control of form.fnx; let index = $index; track index) {
      @let isNew = newItemIndex() === index;
      <div
        class="rounded-lg bg-white p-3 shadow-xs transition-shadow"
        [class.border-2]="isNew"
        [class.border-brand]="isNew"
        [class.shadow-md]="isNew"
        [class.relative]="isNew"
        [class.border]="!isNew"
        [class.border-gray-200]="!isNew"
        (focusout)="onCardFocusout($event)"
      >
        @if (isNew) {
          <span
            class="bg-brand absolute -top-2.5 left-3 rounded-full px-2 py-0.5 text-[9px] font-bold tracking-wider text-white uppercase"
            >NEU</span
          >
        }
        <div class="mb-2 flex items-center justify-between">
          <span class="text-xs font-medium text-gray-500"
            >Funktion {{ index + 1 }}</span
          >
          <div class="flex items-center gap-2">
            <input
              class="h-7 w-7 cursor-pointer rounded border-none"
              [formField]="control.color"
              type="color"
              title="Farbe wählen"
            />
            <button
              class="flex h-7 w-7 items-center justify-center rounded text-gray-400 transition-colors hover:bg-red-50 hover:text-red-500"
              (click)="store.removeFx(index)"
              type="button"
              title="Funktion entfernen"
            >
              <fa-icon [icon]="faTrashCan" />
            </button>
          </div>
        </div>
        <div
          class="mb-2 grid grid-cols-[auto_1fr] items-center gap-x-3 gap-y-2"
        >
          <span class="text-xs text-gray-600">Linie</span>
          <lg-dropdown
            [formField]="control.lineStyle"
            [options]="lineStyleOptions"
          />
          <span class="text-xs text-gray-600">Legende</span>
          <lg-dropdown
            [formField]="control.legendPosition"
            [options]="legendPositionOptions"
          />
        </div>
        <div class="flex items-center gap-2">
          <lg-input
            class="flex-1"
            [field]="control.fnx"
            [id]="'fnx-' + index"
            [autofocus]="isNew"
            [spellcheck]="false"
            type="text"
            autocorrect="off"
            autocomplete="off"
            autocapitalize="off"
            placeholder="z.B. x^2, sin(x), ..."
          />
        </div>
        <lg-math-display
          [math]="control.fnx().value()"
          [prefix]="
            store.model().legendLabelFormat === 'none'
              ? undefined
              : store.model().legendLabelFormat
          "
        />
      </div>
    }

    <div class="flex gap-1.5">
      <button
        class="flex-[1.4]"
        (click)="store.startInteractive(InteractiveMode.StraightLine)"
        lgButton
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faMousePointer" />
        <span>Interaktiv</span>
      </button>
      <button
        class="flex-1"
        (click)="addManual()"
        lgButton
        variant="outline"
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faPlusCircle" />
        <span>Manuell</span>
      </button>
    </div>
  }
</div>
