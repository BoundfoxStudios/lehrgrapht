@let form = store.editorForm;
@let lines = store.model().lines;

<div class="flex flex-col space-y-3 p-2">
  @if (lines.length === 0) {
    <lg-section-empty-state
      [interactiveMode]="InteractiveMode.Line"
      (manualClick)="addManual()"
      heading="Noch keine Linien"
      text="Verbinde zwei Punkte zu einer Strecke. Praktisch für Hilfslinien oder gezeichnete Geraden."
    >
      <lg-section-lines-image />
    </lg-section-empty-state>
  } @else {
    @if (lines.length >= 2) {
      <div class="flex justify-end">
        <button
          (click)="toggleAll()"
          lgButton
          variant="outline"
          size="small"
          type="button"
        >
          {{ allCollapsed() ? 'Alle ausklappen' : 'Alle einklappen' }}
        </button>
      </div>
    }
    @for (control of form.lines; let index = $index; track index) {
      <lg-card
        [title]="'Linie ' + (index + 1)"
        [expanded]="expandedSet().has(index)"
        [isNew]="newItemIndex() === index"
        (expandedChange)="store.toggleCardExpanded('lines', index)"
        (cardFocusOut)="newItemIndex.set(null)"
      >
        <div
          class="flex items-center gap-2"
          card-actions
        >
          <input
            class="h-7 w-7 cursor-pointer rounded border-none"
            [formField]="control.color"
            type="color"
            title="Farbe wählen"
          />
          <button
            class="flex h-7 w-7 items-center justify-center rounded text-gray-400 transition-colors hover:bg-red-50 hover:text-red-500"
            (click)="store.removeLine(index)"
            type="button"
            title="Linie entfernen"
          >
            <fa-icon [icon]="faTrashCan" />
          </button>
        </div>

        <div
          class="mb-2 grid grid-cols-[auto_1fr] items-center gap-x-3 gap-y-2"
        >
          <span class="text-xs text-gray-600">Linie</span>
          <lg-dropdown
            [formField]="control.lineStyle"
            [options]="lineStyleOptions"
          />
        </div>

        <div class="space-y-2">
          <div class="rounded-md bg-gray-50 p-2">
            <div class="mb-1 text-xs font-medium text-gray-500">Startpunkt</div>
            <div class="flex gap-3">
              <div class="flex-1">
                <label
                  class="mb-1 block text-xs text-gray-500"
                  [for]="'line-x1-' + index"
                  >X</label
                >
                <lg-input
                  [field]="control.x1"
                  [id]="'line-x1-' + index"
                  [autofocus]="newItemIndex() === index"
                  type="number"
                />
              </div>
              <div class="flex-1">
                <label
                  class="mb-1 block text-xs text-gray-500"
                  [for]="'line-y1-' + index"
                  >Y</label
                >
                <lg-input
                  [field]="control.y1"
                  [id]="'line-y1-' + index"
                  type="number"
                />
              </div>
            </div>
          </div>
          <div class="rounded-md bg-gray-50 p-2">
            <div class="mb-1 text-xs font-medium text-gray-500">Endpunkt</div>
            <div class="flex gap-3">
              <div class="flex-1">
                <label
                  class="mb-1 block text-xs text-gray-500"
                  [for]="'line-x2-' + index"
                  >X</label
                >
                <lg-input
                  [field]="control.x2"
                  [id]="'line-x2-' + index"
                  type="number"
                />
              </div>
              <div class="flex-1">
                <label
                  class="mb-1 block text-xs text-gray-500"
                  [for]="'line-y2-' + index"
                  >Y</label
                >
                <lg-input
                  [field]="control.y2"
                  [id]="'line-y2-' + index"
                  type="number"
                />
              </div>
            </div>
          </div>
        </div>
      </lg-card>
    }

    <div class="flex gap-1.5">
      <button
        class="flex-[1.4]"
        (click)="store.startInteractive(InteractiveMode.Line)"
        lgButton
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faMousePointer" />
        <span>Interaktiv</span>
      </button>
      <button
        class="flex-1"
        (click)="addManual()"
        lgButton
        variant="outline"
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faPlusCircle" />
        <span>Manuell</span>
      </button>
    </div>
  }
</div>
