@let form = store.editorForm;
@let lines = store.model().lines;

<div class="flex flex-col space-y-3 p-2">
  @if (lines.length === 0) {
    <lg-section-empty-state
      [interactiveMode]="InteractiveMode.Line"
      (manualClick)="addManual()"
      heading="Noch keine Linien"
      text="Verbinde zwei Punkte zu einer Strecke. Praktisch für Hilfslinien oder gezeichnete Geraden."
    >
      <lg-section-lines-image />
    </lg-section-empty-state>
  } @else {
    @for (control of form.lines; let index = $index; track index) {
      @let isNew = newItemIndex() === index;
      <div
        class="rounded-lg bg-white p-3 shadow-xs transition-shadow"
        [class.border-2]="isNew"
        [class.border-brand]="isNew"
        [class.shadow-md]="isNew"
        [class.relative]="isNew"
        [class.border]="!isNew"
        [class.border-gray-200]="!isNew"
        (focusout)="onCardFocusout($event)"
      >
        @if (isNew) {
          <span
            class="bg-brand absolute -top-2.5 left-3 rounded-full px-2 py-0.5 text-[9px] font-bold tracking-wider text-white uppercase"
            >NEU</span
          >
        }
        <div class="mb-3 flex items-center justify-between">
          <span class="text-xs font-medium text-gray-500"
            >Linie {{ index + 1 }}</span
          >
          <div class="flex items-center gap-2">
            <input
              class="h-7 w-7 cursor-pointer rounded border-none"
              [formField]="control.color"
              type="color"
              title="Farbe wählen"
            />
            <button
              class="flex h-7 w-7 items-center justify-center rounded text-gray-400 transition-colors hover:bg-red-50 hover:text-red-500"
              (click)="store.removeLine(index)"
              type="button"
              title="Linie entfernen"
            >
              <fa-icon [icon]="faTrashCan" />
            </button>
          </div>
        </div>

        <div
          class="mb-2 grid grid-cols-[auto_1fr] items-center gap-x-3 gap-y-2"
        >
          <span class="text-xs text-gray-600">Linie</span>
          <lg-dropdown
            [formField]="control.lineStyle"
            [options]="lineStyleOptions"
          />
        </div>

        <div class="space-y-2">
          <div class="rounded-md bg-gray-50 p-2">
            <div class="mb-1 text-xs font-medium text-gray-500">Startpunkt</div>
            <div class="flex gap-3">
              <div class="flex-1">
                <label
                  class="mb-1 block text-xs text-gray-500"
                  [for]="'line-x1-' + index"
                  >X</label
                >
                <lg-input
                  [field]="control.x1"
                  [id]="'line-x1-' + index"
                  [autofocus]="isNew"
                  type="number"
                />
              </div>
              <div class="flex-1">
                <label
                  class="mb-1 block text-xs text-gray-500"
                  [for]="'line-y1-' + index"
                  >Y</label
                >
                <lg-input
                  [field]="control.y1"
                  [id]="'line-y1-' + index"
                  type="number"
                />
              </div>
            </div>
          </div>
          <div class="rounded-md bg-gray-50 p-2">
            <div class="mb-1 text-xs font-medium text-gray-500">Endpunkt</div>
            <div class="flex gap-3">
              <div class="flex-1">
                <label
                  class="mb-1 block text-xs text-gray-500"
                  [for]="'line-x2-' + index"
                  >X</label
                >
                <lg-input
                  [field]="control.x2"
                  [id]="'line-x2-' + index"
                  type="number"
                />
              </div>
              <div class="flex-1">
                <label
                  class="mb-1 block text-xs text-gray-500"
                  [for]="'line-y2-' + index"
                  >Y</label
                >
                <lg-input
                  [field]="control.y2"
                  [id]="'line-y2-' + index"
                  type="number"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    }

    <div class="flex gap-1.5">
      <button
        class="flex-[1.4]"
        (click)="store.startInteractive(InteractiveMode.Line)"
        lgButton
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faMousePointer" />
        <span>Interaktiv</span>
      </button>
      <button
        class="flex-1"
        (click)="addManual()"
        lgButton
        variant="outline"
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faPlusCircle" />
        <span>Manuell</span>
      </button>
    </div>
  }
</div>
