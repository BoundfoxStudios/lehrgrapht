@let form = store.editorForm;
@let markers = store.model().markers;

<div class="flex flex-col space-y-3 p-2">
  @if (markers.length === 0) {
    <lg-section-empty-state
      [interactiveMode]="InteractiveMode.Marker"
      (manualClick)="addManual()"
      heading="Noch keine Punkte"
      text="Markiere Punkte im Koordinatensystem — z. B. Schnittpunkte oder Nullstellen — und beschrifte sie mit A, B, C."
    >
      <lg-section-markers-image />
    </lg-section-empty-state>
  } @else {
    @for (control of form.markers; let index = $index; track index) {
      @let isNew = newItemIndex() === index;
      <div
        class="rounded-lg bg-white p-3 shadow-xs transition-shadow"
        [class.border-2]="isNew"
        [class.border-brand]="isNew"
        [class.shadow-md]="isNew"
        [class.relative]="isNew"
        [class.border]="!isNew"
        [class.border-gray-200]="!isNew"
        (focusout)="onCardFocusout($event)"
      >
        @if (isNew) {
          <span
            class="bg-brand absolute -top-2.5 left-3 rounded-full px-2 py-0.5 text-[9px] font-bold tracking-wider text-white uppercase"
            >NEU</span
          >
        }
        <div class="mb-2 flex items-center justify-between">
          <span class="text-xs font-medium text-gray-500"
            >Punkt {{ index + 1 }}</span
          >
          <button
            class="flex h-7 w-7 items-center justify-center rounded text-gray-400 transition-colors hover:bg-red-50 hover:text-red-500"
            (click)="store.removeMarker(index)"
            type="button"
            title="Punkt entfernen"
          >
            <fa-icon [icon]="faTrashCan" />
          </button>
        </div>
        <div class="mb-2">
          <label
            class="mb-1 block text-xs text-gray-600"
            [for]="'marker-text-' + index"
            >Beschriftung</label
          >
          <lg-input
            [field]="control.text"
            [id]="'marker-text-' + index"
            [autofocus]="isNew"
            [spellcheck]="false"
            type="text"
            autocorrect="off"
            autocomplete="off"
            autocapitalize="off"
            placeholder="z.B. P, A, ..."
          />
        </div>
        <div class="flex gap-3">
          <div class="flex-1">
            <label
              class="mb-1 block text-xs text-gray-600"
              [for]="'marker-x-' + index"
              >X</label
            >
            <lg-input
              [field]="control.x"
              [id]="'marker-x-' + index"
              type="number"
            />
          </div>
          <div class="flex-1">
            <label
              class="mb-1 block text-xs text-gray-600"
              [for]="'marker-y-' + index"
              >Y</label
            >
            <lg-input
              [field]="control.y"
              [id]="'marker-y-' + index"
              type="number"
            />
          </div>
        </div>
      </div>
    }

    <div class="flex gap-1.5">
      <button
        class="flex-[1.4]"
        (click)="store.startInteractive(InteractiveMode.Marker)"
        lgButton
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faMousePointer" />
        <span>Interaktiv</span>
      </button>
      <button
        class="flex-1"
        (click)="addManual()"
        lgButton
        variant="outline"
        size="cta"
        type="button"
      >
        <fa-icon [icon]="faPlusCircle" />
        <span>Manuell</span>
      </button>
    </div>
  }
</div>
