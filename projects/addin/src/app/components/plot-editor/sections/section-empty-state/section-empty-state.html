<div
  class="border-default-medium rounded-base flex flex-col items-center gap-2.5 border bg-white px-4 py-5 text-center"
>
  <ng-content />
  <div>
    <div class="text-heading text-sm font-bold">{{ heading() }}</div>
    <div class="text-body mx-auto mt-1 max-w-[270px] text-xs leading-relaxed">
      {{ text() }}
    </div>
  </div>
</div>
<div class="flex gap-1.5">
  <button
    class="flex-[1.4]"
    (click)="startInteractive()"
    lgButton
    size="cta"
    type="button"
  >
    <fa-icon [icon]="faMousePointer" />
    <span>Interaktiv</span>
  </button>
  <button
    class="flex-1"
    (click)="manualClick.emit()"
    lgButton
    variant="outline"
    size="cta"
    type="button"
  >
    <fa-icon [icon]="faPlusCircle" />
    <span>Manuell</span>
  </button>
</div>
