<lg-header
  [backLink]="backLink()"
  [subtitle]="
    store.isLoading() ? 'Plot wird geladen…' : 'Plot: ' + store.model().name
  "
  title="Plot Editor"
/>

<form
  class="flex flex-1 flex-col"
  [formRoot]="store.editorForm"
>
  @if (store.isLoading()) {
    <div
      class="flex flex-1 items-center justify-center"
      aria-live="polite"
    >
      <fa-icon
        class="text-brand text-3xl"
        [icon]="faCircleNotch"
        animation="spin"
        aria-label="Plot wird geladen"
      />
    </div>
  } @else {
    <div class="flex flex-1 flex-col">
      @if (currentSection()) {
        <lg-tab-strip
          [tabs]="sectionTabs()"
          [active]="currentSection()!"
          (tabChange)="goToSection($event)"
        />
      }
      <router-outlet />
    </div>

    @if (!store.isAnyInteractiveMode()) {
      <lg-preview-dock [errorVariant]="showErrorDock()" />
    }
  }
</form>

@if (store.isAnyInteractiveMode()) {
  <lg-interactive-overlay />
}
