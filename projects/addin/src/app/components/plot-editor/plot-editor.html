<lg-header
  [backLink]="backLink()"
  [subtitle]="'Plot: ' + store.model().name"
  title="Plot Editor"
/>

<form
  class="flex flex-1 flex-col"
  [formRoot]="store.editorForm"
>
  <div class="flex flex-1 flex-col">
    @if (currentSection()) {
      <lg-tab-strip
        [tabs]="sectionTabs()"
        [active]="currentSection()!"
        (tabChange)="goToSection($event)"
      />
    }
    <router-outlet />
  </div>

  <lg-preview-dock [errorVariant]="showErrorDock()" />
</form>
