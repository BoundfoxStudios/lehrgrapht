<header
  class="from-brand to-brand-strong flex items-center gap-2.5 bg-gradient-to-r px-3 py-2.5 text-white shadow-md"
>
  @if (backLink(); as backLink) {
    <a
      class="grid h-8 w-8 shrink-0 place-items-center rounded-full bg-white/15 transition-colors hover:bg-white/25"
      [routerLink]="backLink"
      aria-label="Zurück"
    >
      <fa-icon [icon]="faArrowLeft" />
    </a>
  }

  <div class="min-w-0 flex-1">
    <h1 class="truncate text-base font-semibold tracking-wide">
      {{ title() }}
    </h1>
    @if (subtitle(); as subtitle) {
      <h2 class="text-2xs truncate text-white/80">{{ subtitle }}</h2>
    }
  </div>

  @switch (saveState()) {
    @case ('saving') {
      <span
        class="text-2xs flex shrink-0 items-center gap-1.5 text-white/85"
        aria-live="polite"
      >
        <fa-icon
          class="animate-spin"
          [icon]="faCircleNotch"
        />
        <span>Wird gespeichert …</span>
      </span>
    }
    @case ('saved') {
      <span
        class="text-2xs flex shrink-0 items-center gap-1.5 text-white/85"
        aria-live="polite"
      >
        <fa-icon [icon]="faCheck" />
        <span>Gespeichert</span>
      </span>
    }
  }
</header>
