@for (option of options(); track option.value) {
  @let active = option.value === value();
  <button
    class="focus-visible:ring-brand-medium h-8 flex-1 cursor-pointer rounded-md border transition-shadow focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-1 disabled:cursor-not-allowed disabled:opacity-50"
    [class.border-brand]="active"
    [class.shadow-[0_0_0_2px_var(--color-brand-soft)]]="active"
    [class.border-default-medium]="!active"
    [style.background]="option.color"
    [disabled]="disabled()"
    [attr.aria-checked]="active"
    [attr.aria-label]="option.label ?? option.value"
    (click)="select(option)"
    type="button"
    role="radio"
  ></button>
}
