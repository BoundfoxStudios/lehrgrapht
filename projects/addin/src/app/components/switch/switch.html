<button
  class="lg-switch focus-visible:ring-brand-medium relative shrink-0 cursor-pointer rounded-full transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-offset-1 disabled:cursor-not-allowed disabled:opacity-50"
  [class.h-5]="size() === 'medium'"
  [class.w-9]="size() === 'medium'"
  [class.h-4]="size() === 'small'"
  [class.w-7]="size() === 'small'"
  [class.bg-brand]="value()"
  [class.bg-default-medium]="!value()"
  [class.lg-switch--on]="value()"
  [class.lg-switch--small]="size() === 'small'"
  [id]="inputId()"
  [disabled]="disabled()"
  [attr.aria-checked]="value()"
  [attr.aria-label]="ariaLabel()"
  (click)="toggle()"
  role="switch"
  type="button"
>
  <span class="lg-switch__knob"></span>
</button>
