name: Website
on:
  push:
    branches:
      - main
    paths:
      - 'projects/website/**'
  issues:
  issue_comment:
  schedule:
    - cron: 0 0 * * *

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  cve-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/read-node-version-from-nvmrc
        id: version
      - uses: OWASP/cve-lite-cli@v1
        with:
          node-version: ${{ steps.version.outputs.version }}
          verbose: 'true'
          fail-on: 'high'

  build-and-deploy-website:
    name: Build & Deploy Website
    runs-on: ubuntu-latest
    needs:
      - cve-check
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: ./.github/actions/read-node-version-from-nvmrc
        id: version
      - uses: ./.github/actions/prepare-node
        with:
          version: ${{ steps.version.outputs.version }}
      - run: npm run build:website
        env:
          LEHRGRAPHT_WEBSITE_GITHUB_TOKEN: ${{ secrets.LEHRGRAPHT_WEBSITE_GITHUB_TOKEN }}
      - run: npm run prepare-deployment
      - uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/website/browser/
          server-dir: /
          protocol: ftp
          exclude: |
            addin/**
